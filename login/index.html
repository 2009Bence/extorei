<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Belépés | EXTOREI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:system-ui;background:#070914;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}
    .card{width:min(420px,92vw);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px}
    input,button{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.25);color:#fff}
    button{cursor:pointer;margin-top:10px;background:rgba(124,92,255,.35)}
    .row{display:grid;gap:10px}
    .muted{opacity:.75;font-size:14px}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.25);padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.12)}
  </style>
</head>
<body>
  <div class="card">
    <h2>Belépés / Regisztráció</h2>
    <p class="muted">A demo használatához be kell jelentkezned. Regisztrációkor automatikusan indul a 14 nap próba.</p>

    <div class="row">
      <input id="email" type="email" placeholder="Email" autocomplete="email" required />
      <input id="pass" type="password" placeholder="Jelszó" autocomplete="current-password" required />
      <button id="loginBtn">Belépés</button>
      <button id="signupBtn">Regisztráció (14 nap próba)</button>
      <button id="logoutBtn" style="background:rgba(255,255,255,.08)">Kijelentkezés</button>
      <pre id="out">Betöltés...</pre>
    </div>
  </div>

<script>
(async () => {
  const out = document.getElementById("out");
  const emailEl = document.getElementById("email");
  const passEl  = document.getElementById("pass");

  const cfgRes = await fetch("/api/config", { cache: "no-store" });
  if (!cfgRes.ok) throw new Error("Config fetch failed: " + cfgRes.status);
  const cfg = await cfgRes.json();
  if (!cfg.url || !cfg.anon) throw new Error("Hiányzó env: NEXT_PUBLIC_SUPABASE_URL / ANON_KEY");

  const supa = window.supabase.createClient(cfg.url, cfg.anon);

  async function showSession() {
    const { data } = await supa.auth.getSession();
    out.textContent = data.session
      ? "Be vagy jelentkezve ✅\nUser: " + data.session.user.id
      : "Nem vagy bejelentkezve.";
  }

  document.getElementById("loginBtn").addEventListener("click", async () => {
    out.textContent = "Belépés...";
    const email = emailEl.value.trim();
    const password = passEl.value;

    const { error } = await supa.auth.signInWithPassword({ email, password });
    if (error) { out.textContent = "Hiba: " + error.message; return; }

    out.textContent = "OK ✅";
    location.href = "/index.html";
  });

  document.getElementById("signupBtn").addEventListener("click", async () => {
    out.textContent = "Regisztráció...";
    const email = emailEl.value.trim();
    const password = passEl.value;

    const { error } = await supa.auth.signUp({ email, password });
    if (error) { out.textContent = "Hiba: " + error.message; return; }

    out.textContent =
      "Regisztráció OK ✅\nHa email-confirm be van kapcsolva, nézd meg az emailedet és erősítsd meg.";
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await supa.auth.signOut();
    await showSession();
  });

  await showSession();
})().catch(err => {
  document.getElementById("out").textContent = "Init hiba: " + err.message;
});
</script>
</body>
</html>
