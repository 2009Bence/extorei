<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase teszt</title>
</head>
<body>
  <h1>Supabase kapcsolat teszt</h1>
  <button id="testBtn">Teszt</button>
  <pre id="out"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const out = document.getElementById("out");
    const btn = document.getElementById("testBtn");

    function log(text = "") {
      out.textContent += text + "\n";
    }

    log("=== BETÖLTÉS ELLENŐRZÉS ===");
    log("window.supabase típusa: " + typeof window.supabase);
    log("window.supabase.createClient típusa: " + typeof window.supabase?.createClient);

    const supabaseUrl = "https://kskvssesdnnivawsfjfm.supabase.co";
    const supabaseKey = "sb_publishable_ARj6K36ENV8g9LOtZrWwXw_tBK00b9g";

    let client = null;

    try {
      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        throw new Error("A Supabase CDN könyvtár nem töltődött be rendesen.");
      }

      client = window.supabase.createClient(supabaseUrl, supabaseKey);

      log("client típusa: " + typeof client);
      log("client.auth létezik: " + !!client?.auth);
      log("client.auth.getSession típusa: " + typeof client?.auth?.getSession);
      log("");
    } catch (e) {
      log("INDÍTÁSI HIBA: " + e.message);
      console.error(e);
    }

    btn.addEventListener("click", async () => {
      out.textContent = "";

      log("=== TESZT ===");
      log("window.supabase típusa: " + typeof window.supabase);
      log("window.supabase.createClient típusa: " + typeof window.supabase?.createClient);
      log("client típusa: " + typeof client);
      log("client.auth létezik: " + !!client?.auth);
      log("client.auth.getSession típusa: " + typeof client?.auth?.getSession);
      log("");

      try {
        if (!client) {
          throw new Error("A client nem jött létre.");
        }

        if (!client.auth || typeof client.auth.getSession !== "function") {
          throw new Error("A client.auth vagy a getSession hiányzik.");
        }

        const { data, error } = await client.auth.getSession();

        log("DATA:");
        log(JSON.stringify(data, null, 2));
        log("");
        log("ERROR:");
        log(JSON.stringify(error, null, 2));
      } catch (err) {
        log("HIBA:");
        log(err.message);
        console.error(err);
      }
    });
  </script>
</body>
</html>
