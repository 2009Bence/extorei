<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase teszt</title>
</head>
<body>
  <h1>Supabase kapcsolat teszt</h1>
  <button id="testBtn">Teszt indítása</button>
  <pre id="out"></pre>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script>
  const out = document.getElementById("out");
  const btn = document.getElementById("testBtn");

  btn.addEventListener("click", async () => {
    out.textContent = "";

    out.textContent += "window.supabase típusa: " + typeof window.supabase + "\n";
    out.textContent += "supabase típusa: " + typeof supabase + "\n";
    out.textContent += "supabase.auth: " + String(!!supabase?.auth) + "\n";

    try {
      const { data, error } = await supabase.auth.getSession();
      out.textContent += "DATA:\n" + JSON.stringify(data, null, 2) + "\n";
      out.textContent += "ERROR:\n" + JSON.stringify(error, null, 2) + "\n";
    } catch (err) {
      out.textContent += "HIBA:\n" + err.message + "\n";
    }
  });
</script>
</body>
</html>
