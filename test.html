<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase teszt</title>
</head>
<body>
  <h1>Supabase kapcsolat teszt</h1>
  <button id="testBtn">Teszt</button>
  <pre id="out"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const out = document.getElementById("out");
    const btn = document.getElementById("testBtn");

    const supabaseUrl = "https://kskvssesdnnivawsfjfm.supabase.co";
    const supabaseKey = "sb_publishable_ARj6K36ENV8g9LOtZrWwXw_tBK00b9g";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    btn.addEventListener("click", async () => {
      out.textContent = "";
      out.textContent += "window.supabase: " + typeof window.supabase + "\n";
      out.textContent += "client: " + typeof client + "\n";
      out.textContent += "client.auth: " + !!client.auth + "\n\n";

      try {
        const { data, error } = await client.auth.getSession();
        out.textContent += "DATA:\n" + JSON.stringify(data, null, 2) + "\n\n";
        out.textContent += "ERROR:\n" + JSON.stringify(error, null, 2);
      } catch (err) {
        out.textContent += "HIBA:\n" + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
