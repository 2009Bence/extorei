<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase teljes signup teszt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      line-height: 1.5;
      background: #f5f5f5;
      color: #111;
    }

    h1 {
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
      max-width: 700px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      min-width: 240px;
    }

    pre {
      margin-top: 22px;
      background: #0b0b0b;
      color: #21f321;
      padding: 18px;
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      min-height: 260px;
    }
  </style>
</head>
<body>
  <h1>Supabase teljes signup teszt</h1>

  <div class="field">
    <label for="fullName">Teljes név</label>
    <input id="fullName" type="text" placeholder="pl. Viasz-Kádi Bence" value="Teszt Bence" />
  </div>

  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="pl. teszt123@teszt.hu" />
  </div>

  <div class="field">
    <label for="password">Jelszó</label>
    <input id="password" type="text" value="Teszt123456!" />
  </div>

  <button id="runBtn">Teljes signup teszt futtatása</button>

  <pre id="out"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const out = document.getElementById("out");
    const runBtn = document.getElementById("runBtn");
    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const SUPABASE_URL = "https://kskvssesdnnivawsfjfm.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ARj6K36ENV8g9LOtZrWwXw_tBK00b9g";

    function log(...parts) {
      const line = parts.map(part => {
        if (typeof part === "string") return part;
        try {
          return JSON.stringify(part, null, 2);
        } catch {
          return String(part);
        }
      }).join(" ");

      out.textContent += line + "\n";
      console.log(...parts);
    }

    function section(title) {
      out.textContent += "\n==================== " + title + " ====================\n";
    }

    function makeRandomEmail() {
      return `teszt_${Date.now()}_${Math.floor(Math.random() * 100000)}@teszt.hu`;
    }

    runBtn.addEventListener("click", async () => {
      out.textContent = "";

      section("INDULÁS");

      const fullName = fullNameInput.value.trim();
      let email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        email = makeRandomEmail();
        emailInput.value = email;
        log("Automatikusan generált email:", email);
      } else {
        log("Megadott email:", email);
      }

      log("Teljes név:", fullName || "(üres)");
      log("Jelszó hossza:", password.length);

      const now = new Date().toISOString();
      const trialEnd = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString();

      let supabase = null;

      section("SUPABASE ELLENŐRZÉS");

      try {
        log("window.supabase típusa:", typeof window.supabase);
        log("window.supabase.createClient típusa:", typeof window.supabase?.createClient);

        if (!window.supabase) {
          throw new Error("A Supabase CDN nem töltődött be.");
        }

        if (typeof window.supabase.createClient !== "function") {
          throw new Error("A createClient nem érhető el.");
        }

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        log("Supabase kliens létrejött:", !!supabase);
        log("supabase.auth létezik:", !!supabase?.auth);
        log("supabase.auth.signUp típusa:", typeof supabase?.auth?.signUp);
        log("supabase.auth.getSession típusa:", typeof supabase?.auth?.getSession);
      } catch (err) {
        log("SUPABASE INDÍTÁSI HIBA:", err.message);
        log("STACK:", err.stack || "nincs stack");
        return;
      }

      section("SESSION TESZT");

      try {
        const { data, error } = await supabase.auth.getSession();
        log("SESSION DATA:", data);
        log("SESSION ERROR:", error);
      } catch (err) {
        log("GETSESSION HIBA:", err.message);
        log("STACK:", err.stack || "nincs stack");
        return;
      }

      section("AUTH SIGNUP");

      let user = null;

      try {
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: fullName
            }
          }
        });

        log("SIGNUP DATA:", signUpData);
        log("SIGNUP ERROR:", signUpError);

        if (signUpError) {
          log("❌ AUTH SIGNUP HIBA:", signUpError.message);
          log("Hiba objektum:", signUpError);
          return;
        }

        user = signUpData?.user;

        if (!user) {
          log("❌ A signUp lefutott, de nincs user objektum.");
          log("Lehetséges ok: email confirm beállítás vagy Auth oldali eltérés.");
          return;
        }

        log("✅ AUTH USER ID:", user.id);
        log("✅ AUTH USER EMAIL:", user.email);
      } catch (err) {
        log("❌ AUTH TRY/CATCH HIBA:", err.message);
        log("STACK:", err.stack || "nincs stack");
        return;
      }

      section("PROFILES INSERT");

      try {
        const { data: profileData, error: profileError } = await supabase
          .from("profiles")
          .insert({
            id: user.id,
            email: email,
            full_name: fullName,
            created_at: now
          })
          .select();

        log("PROFILE DATA:", profileData);
        log("PROFILE ERROR:", profileError);

        if (profileError) {
          log("❌ PROFILES INSERT HIBA:", profileError.message);
          log("Hiba objektum:", profileError);
          log("Valószínű ok: RLS policy hiányzik vagy tiltja az insertet.");
          return;
        }

        log("✅ PROFILE INSERT OK");
      } catch (err) {
        log("❌ PROFILE TRY/CATCH HIBA:", err.message);
        log("STACK:", err.stack || "nincs stack");
        return;
      }

      section("SUBSCRIPTIONS INSERT");

      try {
        const { data: subscriptionData, error: subscriptionError } = await supabase
          .from("subscriptions")
          .insert({
            user_id: user.id,
            access_type: "trial",
            status: "active",
            trial_started_at: now,
            trial_ends_at: trialEnd,
            trial_used: true,
            created_at: now,
            updated_at: now
          })
          .select();

        log("SUBSCRIPTION DATA:", subscriptionData);
        log("SUBSCRIPTION ERROR:", subscriptionError);

        if (subscriptionError) {
          log("❌ SUBSCRIPTIONS INSERT HIBA:", subscriptionError.message);
          log("Hiba objektum:", subscriptionError);
          log("Valószínű ok: RLS policy hiányzik vagy tiltja az insertet.");
          return;
        }

        log("✅ SUBSCRIPTION INSERT OK");
      } catch (err) {
        log("❌ SUBSCRIPTION TRY/CATCH HIBA:", err.message);
        log("STACK:", err.stack || "nincs stack");
        return;
      }

      section("VÉGEREDMÉNY");
      log("✅ MINDEN LÉPÉS SIKERES");
      log("Auth user létrejött");
      log("Profiles sor létrejött");
      log("Subscriptions sor létrejött");
    });
  </script>
</body>
</html>
