<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase signup trigger teszt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #f5f5f5;
      color: #111;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 14px;
      max-width: 700px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      min-width: 240px;
    }

    pre {
      margin-top: 22px;
      background: #0b0b0b;
      color: #21f321;
      padding: 18px;
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      min-height: 220px;
    }
  </style>
</head>
<body>
  <h1>Supabase signup trigger teszt</h1>

  <div class="field">
    <label for="fullName">Teljes név</label>
    <input id="fullName" type="text" value="Teszt Bence" />
  </div>

  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="pl. teszt123@teszt.hu" />
  </div>

  <div class="field">
    <label for="password">Jelszó</label>
    <input id="password" type="text" value="Teszt123456!" />
  </div>

  <button id="runBtn">Signup trigger teszt futtatása</button>

  <pre id="out"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const out = document.getElementById("out");
    const runBtn = document.getElementById("runBtn");
    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const SUPABASE_URL = "https://kskvssesdnnivawsfjfm.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ARj6K36ENV8g9LOtZrWwXw_tBK00b9g";

    function log(...parts) {
      const line = parts.map(part => {
        if (typeof part === "string") return part;
        try {
          return JSON.stringify(part, null, 2);
        } catch {
          return String(part);
        }
      }).join(" ");

      out.textContent += line + "\n";
      console.log(...parts);
    }

    function section(title) {
      out.textContent += "\n==================== " + title + " ====================\n";
    }

    function makeRandomEmail() {
      return `teszt_${Date.now()}_${Math.floor(Math.random() * 100000)}@teszt.hu`;
    }

    runBtn.addEventListener("click", async () => {
      out.textContent = "";

      const fullName = fullNameInput.value.trim();
      let email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        email = makeRandomEmail();
        emailInput.value = email;
      }

      section("INDULÁS");
      log("Név:", fullName);
      log("Email:", email);
      log("Jelszó hossza:", password.length);

      let supabase;

      section("SUPABASE");
      try {
        log("window.supabase típusa:", typeof window.supabase);
        log("createClient típusa:", typeof window.supabase?.createClient);

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        log("Kliens létrejött:", !!supabase);
        log("auth létezik:", !!supabase?.auth);
      } catch (err) {
        log("SUPABASE HIBA:", err.message);
        return;
      }

      section("SIGNUP");
      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              full_name: fullName
            }
          }
        });

        log("SIGNUP DATA:", data);
        log("SIGNUP ERROR:", error);

        if (error) {
          log("❌ Signup hiba:", error.message);
          return;
        }

        log("✅ Signup kérés sikeresen lefutott.");

        if (data?.user) {
          log("user.id:", data.user.id);
          log("user.email:", data.user.email);
        } else {
          log("⚠ Nincs user objektum.");
        }

        if (data?.session) {
          log("session: VAN");
        } else {
          log("session: NINCS");
          log("Ez nálad normális, mert email megerősítés van bekapcsolva.");
        }

        section("FONTOS");
        log("Ez az oldal szándékosan NEM ír a profiles/subscriptions táblába.");
        log("A két sort az adatbázis triggernek kell automatikusan létrehoznia.");
        log("Most nézd meg Supabase Table Editorban a profiles és subscriptions táblát.");
      } catch (err) {
        log("❌ TRY/CATCH HIBA:", err.message);
        log("STACK:", err.stack || "nincs stack");
      }
    });
  </script>
</body>
</html>
